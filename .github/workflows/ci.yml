# CI workflow — Brickly
#
# Phase 4 (Monitoring & Control) deliverable. Companion to issue #50.
# This workflow runs on every pull request and on pushes to main.
#
# Currently a stub: when the Phase 3 execution backlog is picked up, the lint,
# typecheck, and test commands will be filled in. For now it validates that
# planning artifacts are well-formed (markdown lint).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Lint planning docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for broken relative links in docs/
        run: |
          # Stub: would run e.g. markdown-link-check.
          # For the plan-only deliverable, this job exists to demonstrate the CI
          # gating mechanism described in CONTRIBUTING.md.
          echo "Planning docs lint: skipped (stub for plan-only deliverable)"

